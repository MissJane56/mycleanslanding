# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: MissJane56/mycleanslanding
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/9e1cbd63-539f-4b05-ab95-b88a41e6862e/pkce
  auth_token_endpoint: /sites/9e1cbd63-539f-4b05-ab95-b88a41e6862e/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://mycleans.com.au

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "landing"
    label: "Landing Page"
    files:
      - name: "landing"
        label: "Landing Page Content"
        file: "content/landing.json"
        fields:
          - label: "Page Meta"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Browser Tab Title", name: "title", widget: "string" }
              - { label: "Search Engine Description", name: "description", widget: "text" }

          - label: "Top Nav"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Tagline (under logo)", name: "tagline", widget: "string" }
              - { label: "Register Button Label", name: "ctaLabel", widget: "string" }

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge Text", name: "badge", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph", name: "paragraph", widget: "text" }
              - { label: "Footnote", name: "footnote", widget: "string" }
              - label: "'The Missing Piece' Card"
                name: "card"
                widget: "object"
                fields:
                  - { label: "Icon Image", name: "image", widget: "image" }
                  - { label: "Icon Alt Text", name: "imageAlt", widget: "string" }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Paragraph", name: "paragraph", widget: "text" }
                  - { label: "Highlighted Closing Line", name: "highlight", widget: "string" }

          - label: "'The Problem' Box"
            name: "problem"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Hosts Column Label", name: "hostsLabel", widget: "string" }
              - label: "Hosts Pain Points"
                name: "hostsPoints"
                widget: "list"
                field: { label: "Point", name: "point", widget: "string" }
              - { label: "Cleaners Column Label", name: "cleanersLabel", widget: "string" }
              - label: "Cleaners Pain Points"
                name: "cleanersPoints"
                widget: "list"
                field: { label: "Point", name: "point", widget: "string" }
              - { label: "Closing Brand Name", name: "closingBrand", widget: "string" }
              - { label: "Closing Tagline", name: "closingTagline", widget: "string" }

          - label: "For Cleaners Section"
            name: "cleaners"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Checklist Items"
                name: "checklist"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Button Label", name: "cta", widget: "string" }
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Photo Alt Text", name: "imageAlt", widget: "string" }
              - label: "Detailed Benefits"
                name: "details"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "string" }

          - label: "For Hosts Section"
            name: "hosts"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph", name: "paragraph", widget: "text" }
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Photo Alt Text", name: "imageAlt", widget: "string" }
              - label: "Detailed Benefits"
                name: "details"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "string" }
              - { label: "Button Label", name: "cta", widget: "string" }

          - label: "How It Works Section"
            name: "features"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph", name: "paragraph", widget: "text" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Number", name: "index", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }

          - label: "Register Section"
            name: "register"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph", name: "paragraph", widget: "text" }
              - { label: "Submit Button Label", name: "submitLabel", widget: "string" }
              - { label: "Submit Button Label (while submitting)", name: "submittingLabel", widget: "string" }
              - { label: "Form Footnote", name: "formNote", widget: "string" }
              - { label: "Success Heading", name: "successHeading", widget: "string" }
              - { label: "Success Message", name: "successParagraph", widget: "text" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Tagline", name: "tagline", widget: "text" }
              - { label: "Copyright Line", name: "copyright", widget: "string" }
              - { label: "Contact Email", name: "contactEmail", widget: "string" }

          - label: "'Suggest a Feature' Modal"
            name: "suggestModal"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro Text", name: "intro", widget: "text" }
              - { label: "Submit Button Label", name: "submitLabel", widget: "string" }
              - { label: "Submit Button Label (while submitting)", name: "submittingLabel", widget: "string" }
              - { label: "Success Heading", name: "successHeading", widget: "string" }
              - { label: "Success Message", name: "successParagraph", widget: "text" }
